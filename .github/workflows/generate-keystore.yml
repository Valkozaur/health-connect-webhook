name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: "Keystore password"
        required: true
      key_password:
        description: "Key password"
        required: true

jobs:
  generate:
    name: Generate signing keystore
    runs-on: ubuntu-latest

    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias release \
            -storepass "${{ inputs.store_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=Health Connect Webhook, O=Personal, L=Unknown, ST=Unknown, C=US"

      - name: Output base64 keystore
        run: |
          echo "============================================"
          echo "Copy the value below into your GitHub secret"
          echo "Secret name: KEYSTORE_BASE64"
          echo "============================================"
          base64 -w 0 release.jks
          echo ""
          echo "============================================"
          echo ""
          echo "Then create these additional secrets:"
          echo "  KEYSTORE_PASSWORD = ${{ inputs.store_password }}"
          echo "  KEY_ALIAS         = release"
          echo "  KEY_PASSWORD      = ${{ inputs.key_password }}"
          echo "============================================"
